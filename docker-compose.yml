version: '3.8'

services:
  app:
    build: .
    image: bingo-game
    container_name: bingo-game-app
    stdin_open: true
    tty: true
    environment:
      - DEBUG=false
      - SEED_VALUE=
    volumes:
      # Uncomment for development to sync code changes
      # - ./src:/app/src
    networks:
      - bingo-network

